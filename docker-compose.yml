version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: futurion-barcode:latest
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    # Uncomment to enable live-reload/dev mode (requires host bind mount and dev script)
    # command: ["sh", "-c", "uv run futurion-barcode-dev"]
    # volumes:
    #   - .:/app
